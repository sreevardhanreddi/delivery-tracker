<!DOCTYPE html>
<html lang="en" x-data="{ 
  darkMode: localStorage.getItem('darkMode') !== null 
    ? localStorage.getItem('darkMode') === 'true' 
    : window.matchMedia('(prefers-color-scheme: dark)').matches 
  }" x-init="
    $watch('darkMode', val => localStorage.setItem('darkMode', val));
    window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', e => {
      if (localStorage.getItem('darkMode') === null) {
        darkMode = e.matches;
      }
    });
  " :class="{ 'dark': darkMode }">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Indian Courier Tracking Hub</title>
  <!-- Favicon -->
  <link rel="icon" type="image/jpeg" href="/static/images/favicon.jpg">
  <!-- Tailwind CSS via CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            dark: {
              bg: '#1a1a1a',
              card: '#2d2d2d',
              text: '#e5e5e5',
              border: '#404040'
            }
          }
        }
      }
    }
  </script>
  <!-- HTMX for dynamic content loading -->
  <script src="https://unpkg.com/htmx.org@1.9.10"></script>
  <!-- Alpine.js for additional interactivity -->
  <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <!-- Courier logos configuration -->
  <script src="/static/js/courier-logos.js"></script>
  <style>
    .progress-bar {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 3px;
      background-color: #f3f4f6;
      z-index: 9999;
      opacity: 0;
      transition: opacity 0.3s ease-in-out;
    }

    .progress-bar.visible {
      opacity: 1;
    }

    .progress-bar .progress {
      height: 100%;
      background-color: #4f46e5;
      width: 0%;
      transition: width 0.3s ease-in-out;
    }

    .progress-bar .progress.complete {
      width: 100%;
    }

    .refresh-package.loading svg {
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      from {
        transform: rotate(0deg);
      }

      to {
        transform: rotate(360deg);
      }
    }
  </style>
</head>

<body class="bg-gray-100 dark:bg-dark-bg min-h-screen transition-colors duration-200">
  <!-- Progress Bar -->
  <div class="progress-bar">
    <div class="progress"></div>
  </div>

  <div class="container mx-auto px-4 py-8">
    <header class="mb-8 flex justify-between items-center">
      <div>
        <h1 class="text-3xl font-bold text-gray-800 dark:text-dark-text">Indian Courier Tracking Hub</h1>
        <p class="text-gray-600 dark:text-gray-400 mt-2">Track your packages across multiple courier services</p>
      </div>
      <!-- Theme Switcher -->
      <button @click="darkMode = !darkMode"
        class="p-2 rounded-lg bg-gray-200 dark:bg-gray-700 hover:bg-gray-300 dark:hover:bg-gray-600 transition-colors duration-200">
        <!-- Sun icon -->
        <svg x-show="!darkMode" xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-gray-800" fill="none"
          viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" />
        </svg>
        <!-- Moon icon -->
        <svg x-show="darkMode" xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-gray-200" fill="none"
          viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />
        </svg>
      </button>
    </header>

    <!-- Add new package form -->
    <div class="bg-white dark:bg-dark-card rounded-lg shadow-md p-6 mb-8 transition-colors duration-200">
      <h2 class="text-xl font-semibold mb-4 text-gray-800 dark:text-dark-text">Add New Package</h2>
      <form id="add-package-form" class="space-y-4">
        <div>
          <label for="tracking_number" class="block text-sm font-medium text-gray-700 dark:text-gray-300">Tracking
            Number</label>
          <input type="text" id="tracking_number" name="number" required
            class="mt-1 block w-full rounded-md border-gray-300 dark:border-gray-600 dark:bg-gray-700 dark:text-white shadow-sm focus:border-indigo-500 focus:ring-indigo-500">
          <p class="mt-1 text-sm text-gray-500 dark:text-gray-400">Supported courier services: BlueDart, DTDC, ECOM
            Express, Delhivery, ShadowFax, Ekart, XpressBees, and Shree Maruti.</p>
        </div>
        <div>
          <label for="description"
            class="block text-sm font-medium text-gray-700 dark:text-gray-300">Description</label>
          <textarea id="description" name="description" rows="3" required
            class="mt-1 block w-full rounded-md border-gray-300 dark:border-gray-600 dark:bg-gray-700 dark:text-white shadow-sm focus:border-indigo-500 focus:ring-indigo-500"></textarea>
        </div>
        <button type="submit"
          class="inline-flex justify-center py-2 px-4 border border-transparent shadow-sm text-sm font-medium rounded-md text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 dark:focus:ring-offset-gray-800">
          Add Package
        </button>
      </form>
    </div>

    <!-- Package list -->
    <div class="bg-white dark:bg-dark-card rounded-lg shadow-md p-6 transition-colors duration-200">
      <div class="mb-4 flex flex-col gap-4 lg:flex-row lg:items-start lg:justify-between">
        <h2 class="text-xl font-semibold text-gray-800 dark:text-dark-text">Tracked Packages</h2>
        <div class="flex w-full flex-col gap-4 lg:w-auto lg:flex-row lg:items-start lg:justify-end">
          <div class="w-full lg:w-96">
            <label for="package-search" class="block text-sm font-medium text-gray-700 dark:text-gray-300">Search
              packages</label>
            <div class="relative mt-1">
              <div
                class="pointer-events-none absolute inset-y-0 left-0 flex items-center pl-3 text-gray-400 dark:text-gray-500">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                  <path fill-rule="evenodd"
                    d="M9 3.5a5.5 5.5 0 104.395 8.802l2.651 2.652a.75.75 0 101.061-1.061l-2.652-2.651A5.5 5.5 0 009 3.5zM5 9a4 4 0 118 0 4 4 0 01-8 0z"
                    clip-rule="evenodd" />
                </svg>
              </div>
              <input type="search" id="package-search" placeholder="Search number or description"
                class="block w-full rounded-full border border-gray-200 bg-gray-50 py-2.5 pl-10 pr-4 text-sm text-gray-900 shadow-sm transition duration-200 placeholder:text-gray-400 hover:border-indigo-300 hover:bg-white focus:border-indigo-500 focus:bg-white focus:outline-none focus:ring-4 focus:ring-indigo-100 dark:border-gray-600 dark:bg-gray-800 dark:text-white dark:placeholder:text-gray-500 dark:hover:border-indigo-500 dark:hover:bg-gray-700 dark:focus:border-indigo-400 dark:focus:bg-gray-700 dark:focus:ring-indigo-500/20">
            </div>
            <p id="search-help" class="mt-2 text-xs text-gray-500 dark:text-gray-400">Enter at least 3 characters.</p>
          </div>
          <div id="pagination-controls"
            class="flex flex-col gap-3 sm:flex-row sm:items-center lg:justify-end hidden lg:pt-7">
            <p id="pagination-summary" class="text-sm text-gray-500 dark:text-gray-400"></p>
            <div class="flex items-center gap-2">
              <button type="button" id="prev-page"
                class="px-3 py-2 text-sm font-medium rounded-md border border-gray-300 dark:border-gray-600 text-gray-700 dark:text-gray-300 disabled:opacity-50 disabled:cursor-not-allowed hover:bg-gray-50 dark:hover:bg-gray-700">Previous</button>
              <button type="button" id="next-page"
                class="px-3 py-2 text-sm font-medium rounded-md border border-gray-300 dark:border-gray-600 text-gray-700 dark:text-gray-300 disabled:opacity-50 disabled:cursor-not-allowed hover:bg-gray-50 dark:hover:bg-gray-700">Next</button>
            </div>
          </div>
        </div>
      </div>
      <div id="package-list">
        <!-- Packages will be loaded here -->
      </div>
    </div>
  </div>

  <!-- Package item template -->
  <template id="package-template">
    <div class="package-item border-b border-gray-200 dark:border-dark-border py-4 last:border-b-0">
      <div class="flex justify-between items-start gap-2">
        <div class="flex-1 min-w-0">
          <div class="flex flex-wrap items-center gap-2">
            <h3 class="text-lg font-medium text-gray-900 dark:text-dark-text tracking-number break-words"></h3>
            <a href="#" target="_blank" rel="noopener noreferrer"
              class="service-chip flex items-center space-x-1 px-2 py-1 text-xs font-medium rounded-full flex-shrink-0">
              <img class="h-4 w-4" src="" alt="" />
              <span class="whitespace-nowrap"></span>
            </a>
            <div
              class="eta-chip hidden flex items-center space-x-1 px-3 py-1 text-xs font-semibold rounded-full bg-indigo-600 text-white flex-shrink-0">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3" fill="none" viewBox="0 0 24 24"
                stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
              </svg>
              <span class="eta-value whitespace-nowrap"></span>
            </div>
          </div>
          <p class="text-sm text-gray-500 dark:text-gray-400 description"></p>
          <p class="text-sm text-gray-500 dark:text-gray-400 mt-1 status"></p>
        </div>
        <div class="flex items-center space-x-2 flex-shrink-0">
          <!-- Accordion toggle button -->
          <button
            class="accordion-toggle text-gray-500 hover:text-gray-700 dark:text-gray-400 dark:hover:text-gray-300 focus:outline-none">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 transform transition-transform duration-200"
              viewBox="0 0 20 20" fill="currentColor">
              <path fill-rule="evenodd"
                d="M5.293 7.293a1 1 0 011.414 0L10 10.586l3.293-3.293a1 1 0 111.414 1.414l-4 4a1 1 0 01-1.414 0l-4-4a1 1 0 010-1.414z"
                clip-rule="evenodd" />
            </svg>
          </button>
          <!-- Refresh button -->
          <button type="button"
            class="refresh-package text-indigo-600 hover:text-indigo-800 dark:text-indigo-400 dark:hover:text-indigo-300 disabled:opacity-50 disabled:cursor-not-allowed"
            title="Refresh package">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
              <path fill-rule="evenodd"
                d="M15.312 11.424a5 5 0 01-9.736 1.302 1 1 0 00-1.948.456 7 7 0 0013.646-1.823H18a1 1 0 000-2h-3a1 1 0 00-1 1v2.424zm-10.624-2.848a5 5 0 019.736-1.302 1 1 0 101.948-.456A7 7 0 002.728 8.642H2a1 1 0 100 2h3a1 1 0 001-1V7.218z"
                clip-rule="evenodd" />
            </svg>
          </button>
          <!-- Delete button -->
          <a href="#" class="delete-package text-red-600 hover:text-red-800 dark:text-red-400 dark:hover:text-red-300">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
              <path fill-rule="evenodd"
                d="M9 2a1 1 0 00-.894.553L7.382 4H4a1 1 0 000 2v10a2 2 0 002 2h8a2 2 0 002-2V6a1 1 0 100-2h-3.382l-.724-1.447A1 1 0 0011 2H9zM7 8a1 1 0 012 0v6a1 1 0 11-2 0V8zm5-1a1 1 0 00-1 1v6a1 1 0 102 0V8a1 1 0 00-1-1z"
                clip-rule="evenodd" />
            </svg>
          </a>
        </div>
      </div>

      <!-- Events table (collapsible) -->
      <div class="accordion-content mt-4 overflow-x-auto hidden">
        <table class="min-w-full divide-y divide-gray-200 dark:divide-dark-border">
          <thead class="bg-gray-50 dark:bg-gray-800">
            <tr>
              <th scope="col"
                class="px-6 py-3 text-left text-xs font-medium text-gray-500 dark:text-gray-400 uppercase tracking-wider">
                Details</th>
              <th scope="col"
                class="px-6 py-3 text-left text-xs font-medium text-gray-500 dark:text-gray-400 uppercase tracking-wider">
                Location</th>
              <th scope="col"
                class="px-6 py-3 text-left text-xs font-medium text-gray-500 dark:text-gray-400 uppercase tracking-wider">
                Date</th>
            </tr>
          </thead>
          <tbody class="bg-white dark:bg-dark-card divide-y divide-gray-200 dark:divide-dark-border events-table">
            <!-- Events will be loaded here -->
          </tbody>
        </table>
      </div>
    </div>
  </template>

  <script>
    // Progress bar management
    const progressBar = document.querySelector('.progress-bar');
    const progress = progressBar.querySelector('.progress');
    let requestCount = 0;

    // Cache the first page so the UI can render quickly before the fresh response arrives.
    const TRACK_CACHE_KEY = 'trackCache.v2';
    const PAGE_SIZE = 10;
    let lastResponseText = null;
    let currentPage = 1;
    let totalPackages = 0;
    let currentSearch = '';
    let searchDebounce = null;
    const openPackages = new Set();

    function loadCachedPackagesToDom() {
      try {
        const cachedText = localStorage.getItem(TRACK_CACHE_KEY);
        if (!cachedText) return;
        lastResponseText = cachedText;
        const packages = JSON.parse(cachedText);
        formatPackages(packages);
      } catch (e) {
        console.warn('Failed to load cached packages:', e);
      }
    }

    function showProgress() {
      requestCount++;
      progressBar.classList.add('visible');
      progress.style.width = '96%';
    }

    function completeProgress() {
      requestCount--;
      if (requestCount <= 0) {
        progress.classList.add('complete');
        setTimeout(() => {
          progressBar.classList.remove('visible');
          progress.classList.remove('complete');
          progress.style.width = '0%';
        }, 300);
      }
    }

    // Initial load: render cached packages immediately (if available), then refresh
    loadCachedPackagesToDom();
    refreshPackageList();

    document.getElementById('package-search').addEventListener('input', function () {
      clearTimeout(searchDebounce);
      searchDebounce = setTimeout(() => {
        const value = this.value.trim();
        currentSearch = value.length >= 3 ? value : '';
        currentPage = 1;
        lastResponseText = null;
        refreshPackageList();
      }, 300);
    });

    document.getElementById('prev-page').addEventListener('click', function () {
      if (currentPage > 1) {
        currentPage--;
        lastResponseText = null;
        refreshPackageList();
      }
    });

    document.getElementById('next-page').addEventListener('click', function () {
      if (currentPage < Math.ceil(totalPackages / PAGE_SIZE)) {
        currentPage++;
        lastResponseText = null;
        refreshPackageList();
      }
    });

    // Set up periodic refresh
    setInterval(refreshPackageList, 16000);

    // Function to refresh the package list
    function refreshPackageList() {
      const params = new URLSearchParams({
        limit: PAGE_SIZE,
        offset: (currentPage - 1) * PAGE_SIZE
      });
      if (currentSearch) {
        params.set('q', currentSearch);
      }

      showProgress();
      fetch(`/api/track?${params.toString()}`)
        .then(response => {
          if (!response.ok) {
            throw new Error(`Request failed with status ${response.status}`);
          }
          totalPackages = Number(response.headers.get('X-Total-Count') || '0');
          return response.text();
        })
        .then(text => {
          const useCache = !currentSearch && currentPage === 1;
          lastResponseText = text;
          if (useCache) {
            try {
              localStorage.setItem(TRACK_CACHE_KEY, text);
            } catch (e) {
              // Ignore quota/disabled storage errors; DOM update is still ok
              console.warn('Failed to persist track cache:', e);
            }
          }

          const packages = JSON.parse(text);
          formatPackages(packages);
          updatePaginationControls();
        })
        .catch(error => {
          console.error('Error refreshing package list:', error);
        })
        .finally(() => {
          completeProgress();
        });
    }

    function updatePaginationControls() {
      const controls = document.getElementById('pagination-controls');
      const summary = document.getElementById('pagination-summary');
      const prevButton = document.getElementById('prev-page');
      const nextButton = document.getElementById('next-page');
      const totalPages = Math.max(1, Math.ceil(totalPackages / PAGE_SIZE));

      if (totalPackages <= PAGE_SIZE && currentPage === 1) {
        controls.classList.add('hidden');
      } else {
        controls.classList.remove('hidden');
      }

      const start = totalPackages === 0 ? 0 : (currentPage - 1) * PAGE_SIZE + 1;
      const end = Math.min(currentPage * PAGE_SIZE, totalPackages);
      summary.textContent = `Showing ${start}-${end} of ${totalPackages}`;
      prevButton.disabled = currentPage === 1;
      nextButton.disabled = currentPage >= totalPages;
    }

    // Add this at the beginning of your script section
    // Handle form submission with JSON data
    document.getElementById('add-package-form').addEventListener('submit', function (e) {
      e.preventDefault();

      const formData = new FormData(this);
      const jsonData = {};
      for (let [key, value] of formData.entries()) {
        jsonData[key] = value;
      }

      // Show loading state
      const submitButton = this.querySelector('button[type="submit"]');
      const originalText = submitButton.textContent;
      submitButton.disabled = true;
      submitButton.textContent = 'Adding...';
      showProgress();

      fetch('/api/track', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify(jsonData)
      })
        .then(response => response.json())
        .then(data => {
          // Clear the form
          this.reset();
          // Refresh the package list
          currentPage = 1;
          lastResponseText = null;
          refreshPackageList();
        })
        .catch(error => {
          console.error('Error adding package:', error);
          alert('Failed to add package. Please try again.');
        })
        .finally(() => {
          // Reset button state
          submitButton.disabled = false;
          submitButton.textContent = originalText;
          completeProgress();
        });
    });

    // Function to format the package list
    function formatPackages(packages) {
      const container = document.getElementById('package-list');
      container.innerHTML = '';

      if (packages.length === 0) {
        container.innerHTML = `<p class="text-gray-500 dark:text-gray-400">${currentSearch ? 'No packages match your search.' : 'No packages tracked yet.'}</p>`;
        updatePaginationControls();
        return;
      }

      const template = document.getElementById('package-template');

      packages.forEach(pkg => {
        const clone = template.content.cloneNode(true);
        const packageItem = clone.querySelector('.package-item');
        packageItem.dataset.trackingNumber = pkg.number;

        // Set tracking number
        clone.querySelector('.tracking-number').textContent = pkg.number;

        // Set service chip
        const serviceChip = clone.querySelector('.service-chip');
        const service = getCourierService(pkg.service);
        const serviceImage = serviceChip.querySelector('img');
        const serviceName = serviceChip.querySelector('span');

        serviceImage.src = service.logo;
        serviceImage.alt = service.alt;
        serviceName.textContent = service.name;
        serviceChip.classList.add(service.color, 'text-white');
        serviceChip.href = service.trackUrl.replace('{trackingNumber}', pkg.number);

        // Set ETA (if present)
        const etaChip = clone.querySelector('.eta-chip');
        const etaValue = clone.querySelector('.eta-value');
        if (pkg.eta) {
          // Format ETA
          const etaDate = new Date(pkg.eta);
          const options = { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' };
          etaValue.textContent = etaDate.toLocaleDateString('en-US', options);
          etaChip.classList.remove('hidden');
        }

        // Set description
        clone.querySelector('.description').textContent = pkg.description || 'No description';

        // Set status
        const statusElement = clone.querySelector('.status');
        if (pkg.status) {
          statusElement.textContent = `Status: ${pkg.status}`;
          statusElement.classList.add('text-green-600', 'dark:text-green-400');
        } else {
          statusElement.textContent = 'Status: Pending';
          statusElement.classList.add('text-yellow-600', 'dark:text-yellow-400');
        }

        // Update delete button href
        const deleteButton = clone.querySelector('.delete-package');
        deleteButton.dataset.trackingNumber = pkg.number;
        deleteButton.dataset.service = pkg.service;
        deleteButton.dataset.description = pkg.description;

        // Update refresh button metadata
        const refreshButton = clone.querySelector('.refresh-package');
        refreshButton.dataset.trackingNumber = pkg.number;
        refreshButton.dataset.service = pkg.service;
        refreshButton.dataset.description = pkg.description;
        if (pkg.status === 'Delivered') {
          refreshButton.remove();
        }

        // Display tracking events from the relationship
        const eventsTable = clone.querySelector('.events-table');
        const events = pkg.tracking_events || [];
        if (events.length > 0) {
          // Sort events by date_time in descending order (newest first)
          events.sort((a, b) => new Date(b.date_time) - new Date(a.date_time));

          events.forEach(event => {
            const row = document.createElement('tr');
            row.innerHTML = `
              <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500 dark:text-gray-400">${event.details || '-'}</td>
              <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500 dark:text-gray-400">${event.location || '-'}</td>
              <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500 dark:text-gray-400">${event.date_time || '-'}</td>
            `;
            eventsTable.appendChild(row);
          });
        } else {
          eventsTable.innerHTML = '<tr><td colspan="3" class="px-6 py-4 text-sm text-gray-500 dark:text-gray-400">No tracking events available</td></tr>';
        }

        if (openPackages.has(pkg.number)) {
          const accordionContent = clone.querySelector('.accordion-content');
          const accordionIcon = clone.querySelector('.accordion-toggle svg');
          accordionContent.classList.remove('hidden');
          accordionIcon.classList.add('rotate-180');
        }

        container.appendChild(clone);
      });

      // Set up accordion functionality
      setupAccordions();

      // Set up delete button functionality
      setupDeleteButtons();

      // Set up refresh button functionality
      setupRefreshButtons();
    }

    // Function to set up accordion functionality
    function setupAccordions() {
      document.querySelectorAll('.accordion-toggle').forEach(toggle => {
        toggle.addEventListener('click', function () {
          const packageItem = this.closest('.package-item');
          const trackingNumber = packageItem.dataset.trackingNumber;
          const content = packageItem.querySelector('.accordion-content');
          const icon = this.querySelector('svg');

          // Toggle the content visibility
          if (content.classList.contains('hidden')) {
            content.classList.remove('hidden');
            icon.classList.add('rotate-180');
            openPackages.add(trackingNumber);
          } else {
            content.classList.add('hidden');
            icon.classList.remove('rotate-180');
            openPackages.delete(trackingNumber);
          }
        });
      });
    }

    // Function to set up delete button functionality
    function setupDeleteButtons() {
      document.querySelectorAll('.delete-package').forEach(button => {
        button.addEventListener('click', function (e) {
          e.preventDefault();

          if (confirm(`Are you sure you want to delete this package? ${this.dataset.trackingNumber} ${this.dataset.service} ${this.dataset.description}`)) {
            const trackingNumber = this.dataset.trackingNumber;
            showProgress();

            // Make a DELETE request to the API
            fetch(`/api/track/${trackingNumber}`, {
              method: 'DELETE',
              headers: {
                'Content-Type': 'application/json'
              }
            })
              .then(response => {
                if (!response.ok) {
                  throw new Error('Failed to delete package');
                }
                openPackages.delete(trackingNumber);
                // Refresh the package list
                refreshPackageList();
              })
              .catch(error => {
                console.error('Error:', error);
                alert('Failed to delete package. Please try again.');
              })
              .finally(() => {
                completeProgress();
              });
          }
        });
      });
    }

    function setupRefreshButtons() {
      document.querySelectorAll('.refresh-package').forEach(button => {
        button.addEventListener('click', function () {
          const trackingNumber = this.dataset.trackingNumber;
          const originalTitle = this.title;

          this.disabled = true;
          this.classList.add('loading');
          this.title = 'Refreshing...';
          showProgress();

          fetch(`/api/track/${trackingNumber}/refresh`, {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json'
            }
          })
            .then(response => {
              if (!response.ok) {
                throw new Error('Failed to refresh package');
              }
              refreshPackageList();
            })
            .catch(error => {
              console.error('Error refreshing package:', error);
              alert('Failed to refresh package. Please try again.');
            })
            .finally(() => {
              this.disabled = false;
              this.classList.remove('loading');
              this.title = originalTitle;
              completeProgress();
            });
        });
      });
    }
  </script>
</body>

</html>
